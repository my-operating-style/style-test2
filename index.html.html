<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Personality Snapshot V1</title>
<style>
body{font-family:Arial,sans-serif;background:#f3f4f6;margin:0;padding:20px}
.box{max-width:700px;margin:auto;background:#fff;padding:20px;border-radius:12px}
.q{margin:14px 0;padding:10px;border-bottom:1px solid #ddd}
button,.wa{display:block;width:100%;padding:12px;border:none;border-radius:8px;margin-top:15px;text-align:center;text-decoration:none}
button{background:#1e3a8a;color:#fff}
.wa{background:#25D366;color:#fff;display:none}
#result{display:none;margin-top:15px;padding:15px;border:1px solid #ccc;border-radius:8px}
</style>
</head>
<body>
<div class="box">
<h2>Personality Snapshot</h2>
<p>16 Questions • 3 Minutes</p>
<form id="quiz"></form>
<button type="button" onclick="calc()">See Result</button>
<div id="result"></div>
<a id="wa" class="wa" href="#">Send Result via WhatsApp</a>
</div>

<script>
const questions=[
"You arrive much earlier than expected.","A friend cancels a plan at the last minute.",
"You suddenly get a free weekend.","In a new group of people.",
"A project changes direction unexpectedly.","Someone asks your advice.",
"Which feels most uncomfortable?","When something good happens.",
"When making an important purchase.","If plans change suddenly.",
"People often describe you as.","When someone disagrees with you.",
"What usually earns your trust?","In a busy week.",
"When facing a difficult choice.","Which statement feels closest?"
];
const opts=[
["Relax","Explore","Tasks","Double-check"],
["No problem","Curious why","Annoyed","Depends"],
["Decide later","Make plans","Recharge","Finish tasks"],
["Observe","Talk","One or two people","Depends"],
["Adapt","Question","Rebuild","Wait"],
["Opinion","Questions","Options","Let them decide"],
["Uncertainty","Being rushed","Depending on others","Wasting time"],
["Keep private","Tell a few","Share openly","Depends"],
["Research","Instinct","Recommendations","Compare"],
["Adapt","Need time","Create structure","Depends"],
["Thoughtful","Independent","Practical","Calm"],
["Discuss","Listen","Let it go","Depends"],
["Consistency","Honesty","Competence","Time"],
["Protect space","Stay connected","Priorities","Adjust"],
["Logic","Intuition","Balance","More info"],
["Quality","Freedom","Stability","Growth"]
];

const f=document.getElementById('quiz');
questions.forEach((q,i)=>{
 let h='<div class="q"><b>'+(i+1)+'. '+q+'</b><br>';
 ['A','B','C','D'].forEach((v,j)=>{
 h+=`<label><input type="radio" name="q${i}" value="${v}"> ${opts[i][j]}</label><br>`;
 });
 h+='</div>';
 f.innerHTML+=h;
});

function calc(){
 let c={A:0,B:0,C:0,D:0};
 for(let i=0;i<16;i++){
  let r=document.querySelector('input[name=q'+i+']:checked');
  if(!r){alert('Please answer all questions');return;}
  c[r.value]++;
 }
 let result='The Anchor', code='ANC-'+c.A+c.B+c.C+c.D, desc='Stable and dependable.';
 let m=Math.max(c.A,c.B,c.C,c.D);
 if(c.A===m){result='The Strategist';code='STR-'+c.A+c.B+c.C+c.D;desc='Thoughtful and deliberate.';}
 else if(c.B===m){result='The Explorer';code='EXP-'+c.A+c.B+c.C+c.D;desc='Curious and adaptable.';}
 else if(c.C===m){result='The Curator';code='CUR-'+c.A+c.B+c.C+c.D;desc='Selective with trust and attention.';}
 else if(c.D===m){result='The Integrator';code='INT-'+c.A+c.B+c.C+c.D;desc='Balances priorities well.';}

 document.getElementById('result').style.display='block';
 document.getElementById('result').innerHTML=`<h3>${result}</h3><p>${desc}</p><p><b>Code:</b> ${code}</p>`;

 let msg=`Personality Snapshot\n\nResult: ${result}\nCode: ${code}`;
 let wa=document.getElementById('wa');
 wa.href='https://wa.me/?text='+encodeURIComponent(msg);
 wa.style.display='block';
}
</script>
</body></html>
